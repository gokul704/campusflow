# Copy to /etc/nginx/sites-available/ (adjust paths), then certbot --nginx.
# Replace: app.example.com, api.example.com
# Containers must listen on the host loopback only, e.g. in compose:
#   ports: [ "127.0.0.1:3000:3000", "127.0.0.1:4000:4000" ]
# If you use docker-compose.port-conflict.yml, set upstreams to 3001 and 4001 instead.

upstream campusflow_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream campusflow_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.example.com;

    location / {
        proxy_pass http://campusflow_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    client_max_body_size 80m;

    location / {
        proxy_pass http://campusflow_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Dev single-host Nginx — HTTP only (no SSL). dev.mish.org.in → :3001 / :4001
#
# Use when you do not want HTTPS on dev. Open http://dev.mish.org.in (not https://).
# Set in .env.dev:
#   NEXT_PUBLIC_API_URL=http://dev.mish.org.in
#   CORS_ORIGINS=http://dev.mish.org.in
# Then rebuild web (see env.vps.dev.example).
#
# Install:
#   sudo cp docker/vps.nginx.single-host.dev-http.conf /etc/nginx/sites-available/campusflow-dev.conf
#   sudo ln -sf /etc/nginx/sites-available/campusflow-dev.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# If you previously installed the HTTPS dev config, replace it with this file.
# Docker: docker-compose.dev-vps.yml (127.0.0.1:3001 / :4001).

upstream campusflow_dev_web {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream campusflow_dev_api {
    server 127.0.0.1:4001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name dev.mish.org.in;

    client_max_body_size 80m;

    location ^~ /api/public/ {
        proxy_pass http://campusflow_dev_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api {
        proxy_pass http://campusflow_dev_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://campusflow_dev_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://campusflow_dev_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

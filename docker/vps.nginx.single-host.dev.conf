# Dev single-host Nginx: dev.mish.org.in → Next.js (:3001) + Express API (:4001).
#
# 1) DNS: A record `dev` → VPS IP (same as production).
# 2) Install cert:
#      sudo mkdir -p /var/www/certbot
#      sudo certbot certonly --webroot -w /var/www/certbot -d dev.mish.org.in
# 3) If `nginx -t` fails on ssl includes, comment options-ssl-nginx.conf and ssl_dhparam lines.
# 4) Install: sudo cp this file /etc/nginx/sites-available/campusflow-dev.conf
#             sudo ln -sf /etc/nginx/sites-available/campusflow-dev.conf /etc/nginx/sites-enabled/
#             sudo nginx -t && sudo systemctl reload nginx
#
# Docker dev stack must publish 127.0.0.1:3001 / :4001 (docker-compose.dev-vps.yml).

upstream campusflow_dev_web {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream campusflow_dev_api {
    server 127.0.0.1:4001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name dev.mish.org.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev.mish.org.in;

    ssl_certificate     /etc/letsencrypt/live/dev.mish.org.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.mish.org.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 80m;

    location ^~ /api/public/ {
        proxy_pass http://campusflow_dev_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api {
        proxy_pass http://campusflow_dev_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://campusflow_dev_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://campusflow_dev_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
